name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.9.17"
  FORCE_COLOR: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}

      - name: Ruff
        run: uv run ruff check .

  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mini_ec
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mini_ec"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/mini_ec

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}

      - name: Pytest
        run: uv run pytest

  docker:
    name: Docker build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs:
      - lint
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Compose
        run: |
          if docker compose version >/dev/null 2>&1; then
            docker compose config >/dev/null
          else
            docker-compose config >/dev/null
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: mini-ec:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Smoke test image
        run: docker run --rm mini-ec:ci python -c "from app.interfaces.api.main import create_app; create_app()"
